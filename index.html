<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Isabelly</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section id="opening" class="screen active">
    <img src="assets/envelope.png" id="envelope">
</section>

<section id="videoScreen" class="screen">
    <video id="openingVideo">
        <source src="assets/opening.mp4" type="video/mp4">
    </video>
</section>

<section id="inviteScreen" class="screen">
    <div class="invite-wrapper">
        <img src="assets/invite-main.png" class="main-invite">

        <div class="buttons-row">
            <a href="https://wa.me/5561992959195" target="_blank">
                <img src="assets/btn-confirmar.svg">
            </a>

            <a href="https://share.google/awzooLA4ul8FZy1jJ" target="_blank">
                <img src="assets/btn-local.svg">
            </a>

            <button id="presentBtn">
                <img src="assets/btn-presentes.svg">
            </button>

            <button id="dressBtn">
                <img src="assets/btn-dress.svg">
            </button>
        </div>
    </div>
</section>

<div id="modalPresent" class="modal">
    <img src="assets/presentes.png">
</div>

<div id="modalDress" class="modal">
    <img src="assets/dress-code.png">
</div>

<script src="script.js"></script>
</body>
</html>
